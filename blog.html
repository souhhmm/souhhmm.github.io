<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog &mdash; Soham Kalburgi</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: #f5d5d5;
        }

        a {
            color: inherit;
            text-decoration-color: #e0bfbf;
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s;
        }

        a:hover {
            text-decoration-color: #c0392b;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px 120px;
        }

        .back {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #aaa;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 48px;
        }

        .back:hover {
            color: #c0392b;
        }

        .page-title {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.01em;
            margin-bottom: 48px;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .post-item {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: inherit;
        }

        .post-item:first-child {
            border-top: 1px solid #f0f0f0;
        }

        .post-item-title {
            font-size: 14px;
            font-weight: 500;
        }

        .post-item-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #aaa;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .draft-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #c0392b;
            border: 1px solid #f0c0b8;
            padding: 1px 6px;
            border-radius: 2px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .empty {
            font-size: 14px;
            color: #aaa;
            font-style: italic;
        }

        footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #ccc;
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid #f0dede;
        }

        @media (max-width: 600px) {
            main {
                padding: 48px 20px 80px;
            }
        }
    </style>
</head>
<body>
    <main>
        <a href="/" class="back">&larr; home</a>

        <h1 class="page-title">Blog</h1>

        <div class="post-list">
            <a href="/posts/placeholder" class="post-item">
                <span class="post-item-title">Placeholder</span>
                <span class="post-item-date">Mar 2026</span>
            </a>
        </div>

        <footer>Soham Kalburgi, 2026</footer>
    </main>
</body>
</html>
