<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placeholder &mdash; Soham Kalburgi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: #f5d5d5;
        }

        a {
            color: inherit;
            text-decoration-color: #e0bfbf;
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s;
        }

        a:hover {
            text-decoration-color: #c0392b;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px 120px;
        }

        .back {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #aaa;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 48px;
        }

        .back:hover {
            color: #c0392b;
        }

        .post-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            line-height: 1.3;
        }

        .post-body p {
            font-size: 15px;
            color: #444;
            margin-bottom: 20px;
        }

        .post-body h2 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-top: 36px;
            margin-bottom: 12px;
        }

        .post-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            background: #f0f0f0;
            padding: 1px 5px;
            border-radius: 2px;
        }

        .post-body pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            background: #f5f5f5;
            border-left: 2px solid #f0c0b8;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #ccc;
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid #f0dede;
        }

        @media (max-width: 600px) {
            main {
                padding: 48px 20px 80px;
            }
        }
    </style>
</head>
<body>
    <main>
        <a href="/" class="back">&larr; home</a>

        <div class="post-meta">March 2026</div>
        <h1>Placeholder</h1>

        <div class="post-body">
            <p>
                This is a placeholder post.
            </p>

            <h2>A section heading</h2>

            <p>
                Stuff goes here.
            </p>

            <pre>
# example
def hello():
    print("hello world!")
            </pre>

            <p>
                That's all for now. Hopefully this placeholder is replaced by actual stuff someday xD.
            </p>
        </div>

        <footer>Soham Kalburgi, 2026</footer>
    </main>
</body>
</html>
